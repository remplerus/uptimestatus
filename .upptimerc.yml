# Change these first
owner: remplerus # Your GitHub organization or username, where this repository lives
repo: uptimestatus # The name of this repository

sites:
  - name: Homepage
    url: https://rempler.com
    type: globalping
    location: Berlin
    expectedStatusCodes:
    - 200
    - 201
    - 403
  - name: Panel
    url: https://panel.rempler.com
    type: globalping
    location: Berlin
  - name: Maven
    url: https://maven.rempler.com
    type: globalping
    location: Berlin
  - name: Hytale
    url: play.rempler.com
    check: "icmp-ping"
    port: 5520

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.rempler.com
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Remplers Uptime
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
